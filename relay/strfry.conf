##
## libre relay: strfry configuration (subset of upstream strfry.conf).
## Full reference: https://github.com/hoytech/strfry/blob/master/strfry.conf
## Verify against your installed strfry version before production use.
##

db = "/app/strfry-db/"

relay {
    # Interface strfry binds to inside the container; Caddy proxies to it.
    bind = "0.0.0.0"
    port = 7777

    # Advertised NIP-11 relay metadata (shown to clients).
    info {
        name = "libre relay"
        description = "A censorship-resistant Nostr relay for libre communities."
        # pubkey = ""   # optional operator pubkey (hex)
        # contact = ""  # optional operator contact
    }

    # Reasonable limits; tune for your host.
    maxWebsocketPayloadSize = 131072
    maxSubsPerConnection = 30

    writePolicy {
        # plugin = ""  # optional path to a write-policy plugin (spam/abuse control)
    }
}
