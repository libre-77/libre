name: Deploy to Pages

# Build the single-file distribution and publish it to GitHub Pages.
# The project page is served from a subpath (https://<user>.github.io/<repo>/),
# so we ship web/dist (self-contained: CSS + JS + i18n + favicon inlined) rather
# than the raw web/ folder, whose absolute asset paths would 404 under a subpath.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build single-file dist
        run: bash ./build.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
